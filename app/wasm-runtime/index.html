<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketTranslate WASM Runtime Slot</title>
  <link rel="stylesheet" href="./assets/css/runtime.css" />
</head>
<body>
  <div class="wrap">
    <div class="panel viewport">
      <div id="emuHost" class="emu-host">
        <div id="game" class="emu-stage"></div>
      </div>
      <div id="runtimePlaceholder" class="emu-placeholder">
        Integrated emulator runtime slot is idle.
      </div>
    </div>
    <div id="statusPanel" class="panel">
      <button class="panel-close" data-close-panel="statusPanel" title="Hide">x</button>
      <div id="status" class="note"></div>
    </div>
  </div>
  <script src="./assets/js/runtime.js"></script>
</body>
</html>
